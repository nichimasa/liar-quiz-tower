<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ナンバークラフト</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="home-screen" id="homeScreen" aria-label="ホーム">
        <div class="home-hero">
          <p class="kicker">Number Craft</p>
          <h1>ナンバークラフト</h1>
          <p class="home-copy">4つの数字をすべて使って10を作る。</p>
        </div>

        <section class="level-grid" aria-label="難易度選択">
          <article class="level-card">
            <div>
              <p class="panel-label">1〜9</p>
              <h2>初級</h2>
            </div>
            <strong id="easyProgressText">0 / 30</strong>
            <button class="primary-button level-start-button" type="button" data-level="easy">始める</button>
          </article>

          <article class="level-card">
            <div>
              <p class="panel-label">1〜15</p>
              <h2>中級</h2>
            </div>
            <strong id="mediumProgressText">0 / 50</strong>
            <button class="primary-button level-start-button" type="button" data-level="medium">始める</button>
          </article>

          <article class="level-card">
            <div>
              <p class="panel-label">1〜20</p>
              <h2>上級</h2>
            </div>
            <strong id="hardProgressText">0 / 80</strong>
            <button class="primary-button level-start-button" type="button" data-level="hard">始める</button>
          </article>
        </section>

        <div class="home-stats">
          <div>
            <span>合計正解</span>
            <strong id="totalProgressText">0 / 160</strong>
          </div>
          <div>
            <span>最速</span>
            <strong id="bestTimeText">-</strong>
          </div>
        </div>
      </section>

      <section class="game-board hidden" id="gameScreen" aria-label="数字パズル">
        <header class="top-bar">
          <div>
            <p class="kicker" id="levelLabel">初級</p>
            <h1>10を作れ</h1>
          </div>
          <div class="score-card" aria-label="現在の難易度の正解数">
            <span>正解</span>
            <strong id="clearedText">0/30</strong>
          </div>
          <div class="score-card" aria-label="経過時間">
            <span>時間</span>
            <strong id="timeText">0.0秒</strong>
          </div>
        </header>

        <section class="target-panel" aria-live="polite">
          <div class="target-ring" aria-hidden="true">
            <span>10</span>
          </div>
          <div>
            <p class="panel-label" id="puzzleText">1 / 30</p>
            <h2 id="targetText">10を作れ</h2>
          </div>
        </section>

        <section class="expression-panel" aria-label="作成中の式">
          <p class="panel-label">式</p>
          <div class="expression-display" id="expressionDisplay">数字を選択</div>
          <div class="result-line">
            <span id="currentValueText">現在値: -</span>
            <span id="usedCountText">0 / 4</span>
          </div>
        </section>

        <section class="number-grid" id="numberGrid" aria-label="使える数字"></section>

        <section class="operator-grid" aria-label="演算子">
          <button class="operator-button" type="button" data-operator="+">+</button>
          <button class="operator-button" type="button" data-operator="-">−</button>
          <button class="operator-button" type="button" data-operator="*">×</button>
          <button class="operator-button" type="button" data-operator="/">÷</button>
        </section>

        <section class="paren-grid" aria-label="括弧">
          <button class="paren-button" type="button" data-paren="open">(</button>
          <button class="paren-button" type="button" data-paren="close">)</button>
        </section>

        <div class="action-row">
          <button class="icon-button" id="undoButton" type="button" aria-label="1つ戻す">↶</button>
          <button class="icon-button" id="clearButton" type="button" aria-label="式を消す">C</button>
          <button class="primary-button" id="checkButton" type="button">判定</button>
          <button class="ghost-button" id="hintButton" type="button">ヒント</button>
          <button class="ghost-button" id="answerButton" type="button">正解</button>
          <button class="ghost-button" id="newPuzzleButton" type="button">新しい問題</button>
          <button class="ghost-button" id="homeButton" type="button">ホーム</button>
        </div>

        <p class="feedback" id="feedback" aria-live="polite"></p>

        <section class="solutions-panel hidden" id="solutionsPanel" aria-label="正解パターン">
          <div class="solutions-heading">
            <p class="panel-label">正解パターン</p>
            <strong id="solutionCountText">0通り</strong>
          </div>
          <ol class="solutions-list" id="solutionsList"></ol>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
