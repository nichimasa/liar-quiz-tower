<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ナンバークラフト</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-board" aria-label="数字パズル">
        <header class="top-bar">
          <div>
            <p class="kicker">Number Craft</p>
            <h1>ナンバークラフト</h1>
          </div>
          <div class="score-card" aria-label="現在の成績">
            <span>連続</span>
            <strong id="streakText">0</strong>
          </div>
        </header>

        <div class="difficulty-tabs" role="tablist" aria-label="難易度">
          <button class="difficulty-button active" type="button" data-target="10">初級</button>
          <button class="difficulty-button" type="button" data-target="20">中級</button>
          <button class="difficulty-button" type="button" data-target="30">上級</button>
        </div>

        <section class="target-panel" aria-live="polite">
          <div class="target-ring" aria-hidden="true">
            <span id="targetBadge">10</span>
          </div>
          <div>
            <p class="panel-label">目標</p>
            <h2 id="targetText">10を作れ</h2>
          </div>
        </section>

        <section class="expression-panel" aria-label="作成中の式">
          <p class="panel-label">式</p>
          <div class="expression-display" id="expressionDisplay">数字を選択</div>
          <div class="result-line">
            <span id="currentValueText">現在値: -</span>
            <span id="usedCountText">0 / 4</span>
          </div>
        </section>

        <section class="number-grid" id="numberGrid" aria-label="使える数字"></section>

        <section class="operator-grid" aria-label="演算子">
          <button class="operator-button" type="button" data-operator="+">+</button>
          <button class="operator-button" type="button" data-operator="-">−</button>
          <button class="operator-button" type="button" data-operator="*">×</button>
          <button class="operator-button" type="button" data-operator="/">÷</button>
        </section>

        <section class="paren-grid" aria-label="括弧">
          <button class="paren-button" type="button" data-paren="open">(</button>
          <button class="paren-button" type="button" data-paren="close">)</button>
        </section>

        <div class="action-row">
          <button class="icon-button" id="undoButton" type="button" aria-label="1つ戻す">↶</button>
          <button class="icon-button" id="clearButton" type="button" aria-label="式を消す">C</button>
          <button class="primary-button" id="checkButton" type="button">判定</button>
          <button class="ghost-button" id="newPuzzleButton" type="button">新しい問題</button>
        </div>

        <p class="feedback" id="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
